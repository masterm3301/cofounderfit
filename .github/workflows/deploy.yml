name: Deploy to Cloudflare

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      # Deliberately scoped to this step only, and to TEST_DATABASE_URL: the
      # test suite truncates every table between tests (see resetDb()). Never
      # let the real DATABASE_URL be in scope here, or CI wipes production.
      - run: npm test
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

      - run: npx opennextjs-cloudflare build

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          secrets: |
            DATABASE_URL
            AUTH_SECRET
            AUTH_LINKEDIN_ID
            AUTH_LINKEDIN_SECRET
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_LINKEDIN_ID: ${{ secrets.AUTH_LINKEDIN_ID }}
          AUTH_LINKEDIN_SECRET: ${{ secrets.AUTH_LINKEDIN_SECRET }}
